<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Shopping List — Coop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #e2001a;
      color: #fff;
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    header span {
      font-size: 14px;
      opacity: 0.85;
    }
    .refresh {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .refresh:active { background: rgba(255,255,255,0.35); }
    .list { padding: 8px 0; }
    .item {
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      min-height: 64px;
      text-decoration: none;
      color: inherit;
      padding: 0 16px;
      gap: 12px;
    }
    .item:active { background: #f0f0f0; }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .dot-ean  { background: #2a9d2a; }
    .dot-text { background: #bbb; }
    .item-name {
      font-size: 17px;
      flex: 1;
    }
    .arrow {
      color: #bbb;
      font-size: 20px;
    }
    .empty {
      text-align: center;
      color: #888;
      padding: 48px 24px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Shopping List</h1>
      <span>{{ rows|length }} item{{ 's' if rows|length != 1 else '' }} — tap to open in Coop</span>
    </div>
    <a class="refresh" href="/shop" title="Refresh">↻</a>
  </header>

  {% if rows %}
  <div class="list">
    {% for row in rows %}
    <a class="item" href="{{ row.url }}">
      <span class="dot {{ 'dot-ean' if row.has_ean else 'dot-text' }}" title="{{ 'EAN match' if row.has_ean else 'Text search' }}"></span>
      <span class="item-name">{{ row.name }}</span>
      <span class="arrow">›</span>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty">Shopping list is empty.</div>
  {% endif %}
</body>
</html>
